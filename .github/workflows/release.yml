name: Build & Release installers

# Deze workflow draait op zowel Windows als macOS in de cloud.
# Beide builden een installer (NSIS .exe voor Windows, .dmg voor macOS)
# en publiceren 'm als asset van dezelfde GitHub Release.
#
# Trigger 'm handmatig vanaf het Actions-tabblad → "Run workflow" →
# versienummer invullen (bv. 0.5.1) → groene knop.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versienummer (zonder 'v', bijv. 0.5.1)"
        required: true
        default: "0.5.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: release:win
          - os: macos-latest
            script: release:mac
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bump version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = "${{ inputs.version }}"
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $v
          ($pkg | ConvertTo-Json -Depth 100) | Set-Content package.json -Encoding UTF8

      - name: Bump version (macOS)
        if: runner.os == 'macOS'
        run: |
          v="${{ inputs.version }}"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='$v'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2));"

      - name: Install dependencies
        run: npm install

      - name: Build & publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.script }}
