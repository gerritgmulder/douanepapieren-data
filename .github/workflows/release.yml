name: Build & Release installers

# Deze workflow draait op zowel Windows als macOS in de cloud.
# Beide builden een installer (NSIS .exe voor Windows, .dmg voor macOS)
# en publiceren 'm als asset van dezelfde GitHub Release.
#
# Triggers:
#   • Tag pushen die met 'v' begint (bv. v0.17.0) → auto-build op die versie
#   • Of handmatig vanaf het Actions-tabblad → "Run workflow" → versie invullen

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versienummer (zonder 'v', bijv. 0.5.1)"
        required: true
        default: "0.5.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: release:win
          - os: macos-latest
            script: release:mac
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bepaal versie (Windows)
        if: runner.os == 'Windows'
        id: version-win
        shell: pwsh
        run: |
          # Bij tag-trigger: pak versie uit de tag-naam (strip 'refs/tags/v' prefix).
          # Bij workflow_dispatch: gebruik de input.
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $v = "${{ github.ref }}".Substring("refs/tags/v".Length)
          } else {
            $v = "${{ inputs.version }}"
          }
          Write-Host "Versie: $v"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $v
          ($pkg | ConvertTo-Json -Depth 100) | Set-Content package.json -Encoding UTF8

      - name: Bepaal versie (macOS)
        if: runner.os == 'macOS'
        id: version-mac
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="${{ inputs.version }}"
          fi
          echo "Versie: $v"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='$v'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2));"

      - name: Install dependencies
        run: npm install

      - name: Build & publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.script }}
