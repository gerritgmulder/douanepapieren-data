<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Visitor Sign In — Fonteyn UK</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap">
<style>
  :root {
    --fonteyn-green: #144734;
    --fonteyn-green-dark: #0d3325;
    --fonteyn-lime: #8bc53f;
    --fonteyn-lime-dark: #72a531;
    --fonteyn-cream: #fff9ae;
    --bg: #f5f4ef;
    --ink: #1f2937;
    --muted: #6b7280;
    --border: #e5e7eb;
    --ok: #059669;
    --bad: #b91c1c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: "Montserrat", -apple-system, sans-serif;
    background: var(--bg); color: var(--ink); font-size: 16px;
    display: flex; flex-direction: column;
  }

  header {
    background: var(--fonteyn-green); color: #fff;
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;
    flex-shrink: 0;
  }
  header img.logo { height: 38px; width: auto; display: block; }
  header h1 { margin: 0; font-size: 15px; font-weight: 600; flex: 1; }
  header .clock { font-size: 14px; font-variant-numeric: tabular-nums; color: rgba(255,255,255,0.9); }
  header button.ghost {
    background: transparent; color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
    padding: 6px 12px; font: inherit; font-size: 12px; cursor: pointer;
  }
  header button.ghost:hover { color: #fff; border-color: rgba(255,255,255,0.6); }

  main { flex: 1; overflow-y: auto; padding: 24px; max-width: 860px; margin: 0 auto; width: 100%; }

  /* ─── Kiosk home ─── */
  .kiosk-home { text-align: center; padding-top: 4vh; }
  .kiosk-home h2 {
    color: var(--fonteyn-green); font-size: clamp(28px, 5vw, 44px);
    margin: 0 0 8px; letter-spacing: 0.02em;
  }
  .kiosk-home .sub { color: var(--muted); font-size: clamp(15px, 2.5vw, 19px); margin: 0 0 5vh; }
  .big-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
  .big-btn {
    flex: 1 1 280px; max-width: 340px; min-height: 160px;
    border: 0; border-radius: 18px; cursor: pointer;
    font-family: inherit; font-size: 24px; font-weight: 700;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    transition: transform .1s ease;
  }
  .big-btn:active { transform: scale(0.97); }
  .big-btn .icon { font-size: 44px; }
  .big-btn.in { background: var(--fonteyn-lime); color: var(--fonteyn-green); }
  .big-btn.out { background: #fff; color: var(--fonteyn-green); border: 3px solid var(--fonteyn-green); }
  .present-count { margin-top: 5vh; color: var(--muted); font-size: 15px; }

  /* ─── Form ─── */
  .panel {
    background: #fff; border: 1px solid var(--border); border-radius: 14px;
    padding: 24px; margin: 0 auto;
  }
  .panel h2 { color: var(--fonteyn-green); margin: 0 0 18px; font-size: 24px; }
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 13px; font-weight: 600; color: var(--fonteyn-green);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .field label .opt { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; }
  .field input[type="text"], .field input[type="email"], .field input[type="tel"] {
    width: 100%; border: 2px solid var(--border); border-radius: 10px;
    padding: 14px 16px; font: inherit; font-size: 18px;
  }
  .field input:focus { outline: none; border-color: var(--fonteyn-lime); }

  .chips { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip {
    border: 2px solid var(--border); background: #fff; border-radius: 24px;
    padding: 12px 18px; font: inherit; font-size: 15px; cursor: pointer;
    color: var(--ink);
  }
  .chip.sel { background: var(--fonteyn-lime); border-color: var(--fonteyn-lime); color: var(--fonteyn-green); font-weight: 700; }

  .sig-wrap { position: relative; }
  canvas.sig {
    width: 100%; height: 200px; border: 2px dashed #cbd5e1; border-radius: 10px;
    background: #fcfcfa; touch-action: none; display: block;
  }
  canvas.sig.signed { border-style: solid; border-color: var(--fonteyn-lime); }
  .sig-hint {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #c4c8ce; font-size: 17px; pointer-events: none;
  }
  .sig-clear {
    position: absolute; top: 8px; right: 8px;
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 12px; font: inherit; font-size: 13px; cursor: pointer; color: var(--muted);
  }

  .form-actions { display: flex; gap: 14px; margin-top: 22px; }
  button.primary {
    flex: 1; background: var(--fonteyn-lime); color: var(--fonteyn-green);
    border: 0; border-radius: 12px; padding: 18px; font: inherit;
    font-size: 19px; font-weight: 700; cursor: pointer;
  }
  button.primary:active { background: var(--fonteyn-lime-dark); color: #fff; }
  button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary {
    background: #fff; color: var(--fonteyn-green); border: 2px solid var(--border);
    border-radius: 12px; padding: 18px 24px; font: inherit; font-size: 17px;
    font-weight: 600; cursor: pointer;
  }
  .err-msg { color: var(--bad); font-size: 14px; margin-top: 10px; display: none; }

  /* ─── Sign-out list ─── */
  .visitor-list { display: flex; flex-direction: column; gap: 12px; }
  .visitor-btn {
    display: flex; align-items: center; gap: 16px;
    background: #fff; border: 2px solid var(--border); border-radius: 12px;
    padding: 18px 20px; font: inherit; font-size: 18px; cursor: pointer; text-align: left;
  }
  .visitor-btn:active { border-color: var(--fonteyn-lime); }
  .visitor-btn .name { font-weight: 700; color: var(--fonteyn-green); flex: 1; }
  .visitor-btn .time { color: var(--muted); font-size: 14px; }
  .empty-note { text-align: center; color: var(--muted); padding: 30px 0; font-size: 17px; }

  /* ─── Success overlay ─── */
  .overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(20, 71, 52, 0.96); color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
  }
  .overlay .icon { font-size: 70px; margin-bottom: 16px; }
  .overlay h2 { font-size: clamp(26px, 5vw, 40px); margin: 0 0 10px; }
  .overlay p { font-size: 18px; color: rgba(255,255,255,0.85); margin: 0; }

  /* ─── Staff view ─── */
  .staff-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .staff-toolbar select {
    border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px;
    font: inherit; font-size: 14px; background: #fff;
  }
  .staff-toolbar button {
    border: 1px solid var(--border); background: #fff; border-radius: 8px;
    padding: 9px 14px; font: inherit; font-size: 14px; cursor: pointer; color: var(--fonteyn-green);
    font-weight: 600;
  }
  .staff-toolbar button:hover { border-color: var(--fonteyn-lime); }
  table.log { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; }
  table.log th, table.log td {
    padding: 8px 10px; border-bottom: 1px solid #f3f4f6; text-align: left; vertical-align: middle;
  }
  table.log th {
    background: #f9fafb; font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.03em; color: var(--muted); white-space: nowrap;
  }
  table.log img.sig-thumb { height: 34px; width: auto; display: block; }
  table.log .still-in { color: var(--ok); font-weight: 700; }
  table.log button.mini {
    border: 1px solid var(--border); background: #fff; border-radius: 6px;
    padding: 4px 8px; font: inherit; font-size: 11px; cursor: pointer;
  }

  .hidden { display: none !important; }

  /* ─── Print: alleen het log, in de stijl van het originele sheet ─── */
  @media print {
    header, .staff-toolbar, .no-print { display: none !important; }
    body { background: #fff; }
    main { max-width: none; padding: 0; }
    .print-header { display: block !important; text-align: center; margin-bottom: 14px; }
    .print-header h2 { color: #144734; margin: 0 0 4px; }
    .print-header p { color: #555; margin: 0; font-size: 13px; }
    table.log { font-size: 11px; }
    table.log th, table.log td { border: 1px solid #ccc; padding: 5px 7px; }
  }
  .print-header { display: none; }
</style>
</head>
<body>

<header>
  <img class="logo" src="fonteyn-logo.png" alt="Fonteyn">
  <h1>Visitor Sign In — Fonteyn UK</h1>
  <span class="clock" id="clock">—</span>
  <button class="ghost no-print" id="staffBtn" type="button">Staff</button>
  <button class="ghost no-print" id="backBtn" type="button">Dashboard</button>
</header>

<main>
  <!-- ═══ Kiosk home ═══ -->
  <section id="viewHome" class="kiosk-home">
    <h2>WELCOME TO FONTEYN!</h2>
    <p class="sub">Thanks for visiting our showroom! Please sign in below.</p>
    <div class="big-buttons">
      <button class="big-btn in" id="btnGoSignIn" type="button">
        <span class="icon">✍️</span>
        Sign In
      </button>
      <button class="big-btn out" id="btnGoSignOut" type="button">
        <span class="icon">👋</span>
        Sign Out
      </button>
    </div>
    <div class="present-count" id="presentCount"></div>
  </section>

  <!-- ═══ Sign-in form ═══ -->
  <section id="viewSignIn" class="hidden">
    <div class="panel">
      <h2>Sign in</h2>
      <div class="field">
        <label>Name</label>
        <input type="text" id="fName" autocomplete="off" autocapitalize="words" placeholder="Your full name">
      </div>
      <div class="field">
        <label>Email address <span class="opt">(optional)</span></label>
        <input type="email" id="fEmail" autocomplete="off" placeholder="name@example.com">
      </div>
      <div class="field">
        <label>Phone number <span class="opt">(optional)</span></label>
        <input type="tel" id="fPhone" autocomplete="off" placeholder="07…">
      </div>
      <div class="field">
        <label>Vehicle registration <span class="opt">(optional)</span></label>
        <input type="text" id="fVehicle" autocomplete="off" style="text-transform:uppercase" placeholder="AB12 CDE">
      </div>
      <div class="field">
        <label>How did you hear about us? <span class="opt">(optional)</span></label>
        <div class="chips" id="heardChips"></div>
      </div>
      <div class="field">
        <label>Signature</label>
        <div class="sig-wrap">
          <canvas class="sig" id="sigCanvas" width="600" height="200"></canvas>
          <div class="sig-hint" id="sigHint">Sign here with your finger</div>
          <button class="sig-clear" id="sigClear" type="button">Clear</button>
        </div>
      </div>
      <div class="err-msg" id="formErr"></div>
      <div class="form-actions">
        <button class="secondary" id="btnCancelIn" type="button">Cancel</button>
        <button class="primary" id="btnSubmitIn" type="button">Sign In</button>
      </div>
    </div>
  </section>

  <!-- ═══ Sign-out list ═══ -->
  <section id="viewSignOut" class="hidden">
    <div class="panel">
      <h2>Who is signing out?</h2>
      <div class="visitor-list" id="signOutList"></div>
      <div class="form-actions">
        <button class="secondary" id="btnCancelOut" type="button" style="flex:1;">Back</button>
      </div>
    </div>
  </section>

  <!-- ═══ Staff log ═══ -->
  <section id="viewStaff" class="hidden">
    <div class="print-header">
      <h2>WELCOME TO FONTEYN! — Visitor log</h2>
      <p id="printMonthLabel"></p>
    </div>
    <div class="staff-toolbar no-print">
      <select id="monthSelect"></select>
      <button id="btnExportCsv" type="button">⬇ Export CSV</button>
      <button id="btnPrint" type="button">🖨 Print</button>
      <span id="staffMeta" style="color:var(--muted);font-size:13px;"></span>
      <button id="btnCloseStaff" type="button" style="margin-left:auto;">✕ Close</button>
    </div>
    <div style="overflow-x:auto;">
      <table class="log">
        <thead>
          <tr>
            <th>Date</th><th>Name</th><th>Email</th><th>Phone</th><th>Vehicle</th>
            <th>Heard about us</th><th>Time in</th><th>Time out</th><th>Signature</th>
            <th class="no-print"></th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
const SESSION_KEY = "fp.session";
const EMAIL_KEY   = "fp.email";

// ─── Access: kiosk-account + admins. UK-login toevoegen zodra bekend. ───
const ALLOWED = new Set([
  "gerrit@fonteyn.nl",     "gerrit",
  "fonteynbot@fonteyn.nl", "fonteyn.bot", "fonteynbot",
  // UK showroom kiosk-account hier toevoegen, bv:
  // "uk@fonteyn.nl", "fonteyn.uk",
]);
(function boot() {
  if (!localStorage.getItem(SESSION_KEY)) { location.href = "dashboard.html"; return; }
  const email = (localStorage.getItem(EMAIL_KEY) || "").toLowerCase();
  if (!ALLOWED.has(email)) {
    document.body.innerHTML =
      "<main style='padding:40px;text-align:center;font-family:Montserrat,system-ui;'>" +
      "<h1 style='color:#144734;'>No access</h1>" +
      "<p>This page is for the Fonteyn UK showroom kiosk.</p>" +
      "<p>You are logged in as <code>" + (email || "(unknown)") + "</code>.</p>" +
      "<p><a href='dashboard.html'>← Back to dashboard</a></p></main>";
    throw new Error("No access");
  }
})();

// ─── Centrale opslag: Cloudflare Worker + KV, bucket per maand ───
// (1 MB-limiet per bucket; handtekeningen als vector-strokes ≈ 2 KB,
// dus een maand-bucket blijft ruim onder de limiet.)
const DATA_STORE_BASE = "https://fonteyn-data-store.g-mulder.workers.dev/data/";
const DATA_STORE_AUTH = "SV--QQW_xwIgrIdbjAozfgnxtloYitCZxEQ_S04gv2YupY4LY4KD7_QvfVkb8DGs";

function monthKey(d = new Date()) {
  return "signin-" + d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}

async function kvLoad(bucket) {
  const r = await fetch(DATA_STORE_BASE + bucket, {
    headers: { "X-Fonteyn-Auth": DATA_STORE_AUTH }
  });
  if (!r.ok) throw new Error("Load failed: HTTP " + r.status);
  const j = await r.json();
  return (j && Array.isArray(j.entries)) ? j : { entries: [] };
}
async function kvSave(bucket, data) {
  const r = await fetch(DATA_STORE_BASE + bucket, {
    method: "PUT",
    headers: { "X-Fonteyn-Auth": DATA_STORE_AUTH, "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error("Save failed: HTTP " + r.status);
}

// ─── State ───
let state = { entries: [] };   // huidige maand
let currentView = "home";

const el = id => document.getElementById(id);

// ─── Klok ───
function tickClock() {
  const now = new Date();
  el("clock").textContent =
    now.toLocaleDateString("en-GB", { weekday: "short", day: "2-digit", month: "short" }) +
    "  " + now.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
}
setInterval(tickClock, 10_000); tickClock();

// ─── Views ───
function show(view) {
  currentView = view;
  for (const v of ["Home", "SignIn", "SignOut", "Staff"]) {
    el("view" + v).classList.toggle("hidden", view !== v.toLowerCase());
  }
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function timeStr() {
  return new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
}

function refreshPresentCount() {
  const today = todayStr();
  const present = state.entries.filter(e => e.date === today && !e.timeOut);
  el("presentCount").textContent = present.length === 0
    ? "" : present.length === 1
    ? "1 visitor currently in the showroom"
    : present.length + " visitors currently in the showroom";
}

async function reloadData() {
  try {
    state = await kvLoad(monthKey());
    refreshPresentCount();
  } catch (e) {
    console.warn("[signin] load failed:", e.message);
  }
}
reloadData();
setInterval(reloadData, 60_000);  // sync elke minuut (meerdere apparaten)

// ─── "How did you hear about us?" chips ───
const HEARD_OPTIONS = ["Google / search", "Social media", "Recommendation", "Passing by", "Advertisement", "Returning customer", "Other"];
let heardSel = "";
(function buildChips() {
  const wrap = el("heardChips");
  for (const opt of HEARD_OPTIONS) {
    const b = document.createElement("button");
    b.type = "button"; b.className = "chip"; b.textContent = opt;
    b.addEventListener("click", () => {
      heardSel = (heardSel === opt) ? "" : opt;
      wrap.querySelectorAll(".chip").forEach(c => c.classList.toggle("sel", c.textContent === heardSel));
    });
    wrap.appendChild(b);
  }
})();

// ─── Handtekening-canvas (vector strokes; touch + pen + muis) ───
const canvas = el("sigCanvas");
const ctx = canvas.getContext("2d");
let strokes = [];        // [[x,y,x,y,...], ...]
let curStroke = null;
let lastPt = null;

function canvasPos(ev) {
  const rect = canvas.getBoundingClientRect();
  return [
    Math.round((ev.clientX - rect.left) * (canvas.width / rect.width)),
    Math.round((ev.clientY - rect.top) * (canvas.height / rect.height)),
  ];
}
function drawSegment(x1, y1, x2, y2) {
  ctx.strokeStyle = "#1f2937"; ctx.lineWidth = 2.5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}
canvas.addEventListener("pointerdown", ev => {
  ev.preventDefault();
  canvas.setPointerCapture(ev.pointerId);
  const [x, y] = canvasPos(ev);
  curStroke = [x, y];
  lastPt = [x, y];
  drawSegment(x, y, x, y);
  el("sigHint").style.display = "none";
  canvas.classList.add("signed");
});
canvas.addEventListener("pointermove", ev => {
  if (!curStroke) return;
  ev.preventDefault();
  const [x, y] = canvasPos(ev);
  // alleen punten >2px van vorige (compacte opslag)
  if (Math.abs(x - lastPt[0]) + Math.abs(y - lastPt[1]) < 3) return;
  drawSegment(lastPt[0], lastPt[1], x, y);
  curStroke.push(x, y);
  lastPt = [x, y];
});
function endStroke(ev) {
  if (!curStroke) return;
  if (curStroke.length >= 2) strokes.push(curStroke);
  curStroke = null; lastPt = null;
}
canvas.addEventListener("pointerup", endStroke);
canvas.addEventListener("pointercancel", endStroke);

function clearSignature() {
  strokes = []; curStroke = null;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  el("sigHint").style.display = "";
  canvas.classList.remove("signed");
}
el("sigClear").addEventListener("click", clearSignature);

// Render vector-handtekening naar een dataURL (voor staff-log)
function strokesToDataUrl(sig, w, h) {
  const c = document.createElement("canvas");
  c.width = w || 600; c.height = h || 200;
  const x = c.getContext("2d");
  x.strokeStyle = "#1f2937"; x.lineWidth = 3; x.lineCap = "round"; x.lineJoin = "round";
  for (const s of (sig || [])) {
    x.beginPath();
    x.moveTo(s[0], s[1]);
    for (let i = 2; i < s.length; i += 2) x.lineTo(s[i], s[i + 1]);
    x.stroke();
  }
  return c.toDataURL("image/png");
}

// ─── Navigatie ───
el("btnGoSignIn").addEventListener("click", () => {
  el("fName").value = ""; el("fEmail").value = ""; el("fPhone").value = ""; el("fVehicle").value = "";
  heardSel = "";
  el("heardChips").querySelectorAll(".chip").forEach(c => c.classList.remove("sel"));
  clearSignature();
  el("formErr").style.display = "none";
  show("signin");
});
el("btnCancelIn").addEventListener("click", () => show("home"));
el("btnGoSignOut").addEventListener("click", () => { renderSignOutList(); show("signout"); });
el("btnCancelOut").addEventListener("click", () => show("home"));
el("backBtn").addEventListener("click", () => location.href = "dashboard.html");

// ─── Sign in submit ───
el("btnSubmitIn").addEventListener("click", async () => {
  const name = el("fName").value.trim();
  const err = el("formErr");
  if (!name) { err.textContent = "Please enter your name."; err.style.display = "block"; return; }
  if (!strokes.length) { err.textContent = "Please sign in the signature box."; err.style.display = "block"; return; }
  err.style.display = "none";
  el("btnSubmitIn").disabled = true;
  try {
    // Read-modify-write: herlaad eerst zodat we niets van een ander
    // apparaat overschrijven (kiosk is meestal single-device, maar toch).
    const bucket = monthKey();
    const fresh = await kvLoad(bucket);
    fresh.entries.push({
      id: "v" + Date.now().toString(36) + Math.floor(Math.random() * 1e4).toString(36),
      date: todayStr(),
      name,
      email: el("fEmail").value.trim(),
      phone: el("fPhone").value.trim(),
      vehicle: el("fVehicle").value.trim().toUpperCase(),
      heard: heardSel,
      timeIn: timeStr(),
      timeOut: "",
      sig: strokes,
    });
    await kvSave(bucket, fresh);
    state = fresh;
    refreshPresentCount();
    showOverlay("👋", "Welcome, " + name.split(" ")[0] + "!", "Enjoy your visit. Please remember to sign out when you leave.");
    show("home");
  } catch (e) {
    err.textContent = "Could not save — please check the internet connection and try again. (" + e.message + ")";
    err.style.display = "block";
  } finally {
    el("btnSubmitIn").disabled = false;
  }
});

// ─── Sign out ───
function renderSignOutList() {
  const list = el("signOutList");
  list.innerHTML = "";
  const today = todayStr();
  const present = state.entries.filter(e => e.date === today && !e.timeOut);
  if (!present.length) {
    list.innerHTML = `<div class="empty-note">No one is currently signed in.</div>`;
    return;
  }
  for (const e of present) {
    const b = document.createElement("button");
    b.type = "button"; b.className = "visitor-btn";
    b.innerHTML = `<span class="name"></span><span class="time">in since ${escapeHtml(e.timeIn)}</span>`;
    b.querySelector(".name").textContent = e.name;
    b.addEventListener("click", () => signOut(e.id, e.name));
    list.appendChild(b);
  }
}
async function signOut(id, name) {
  if (!confirm("Sign out " + name + "?")) return;
  try {
    const bucket = monthKey();
    const fresh = await kvLoad(bucket);
    const entry = fresh.entries.find(e => e.id === id);
    if (entry && !entry.timeOut) {
      entry.timeOut = timeStr();
      await kvSave(bucket, fresh);
    }
    state = fresh;
    refreshPresentCount();
    showOverlay("👍", "Goodbye, " + name.split(" ")[0] + "!", "Thanks for visiting Fonteyn. See you next time!");
    show("home");
  } catch (e) {
    alert("Could not save sign-out — please try again. (" + e.message + ")");
  }
}

// ─── Success overlay ───
function showOverlay(icon, title, sub) {
  const o = document.createElement("div");
  o.className = "overlay";
  o.innerHTML = `<div class="icon">${icon}</div><h2></h2><p></p>`;
  o.querySelector("h2").textContent = title;
  o.querySelector("p").textContent = sub;
  document.body.appendChild(o);
  const close = () => o.remove();
  o.addEventListener("click", close);
  setTimeout(close, 4000);
}

// ─── Staff view ───
el("staffBtn").addEventListener("click", async () => {
  await buildMonthSelect();
  await renderStaffLog(monthKey());
  show("staff");
});
el("btnCloseStaff").addEventListener("click", () => show("home"));

async function buildMonthSelect() {
  // Toon huidige + 11 vorige maanden; data wordt per maand on-demand geladen.
  const sel = el("monthSelect");
  sel.innerHTML = "";
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = monthKey(d);
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = d.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
    sel.appendChild(opt);
  }
  sel.onchange = () => renderStaffLog(sel.value);
}

let staffData = { entries: [] };
let staffBucket = "";

async function renderStaffLog(bucket) {
  staffBucket = bucket;
  el("staffMeta").textContent = "Loading…";
  try {
    staffData = (bucket === monthKey()) ? state : await kvLoad(bucket);
  } catch (e) {
    el("staffMeta").textContent = "Load error: " + e.message;
    staffData = { entries: [] };
  }
  const body = el("logBody");
  body.innerHTML = "";
  const entries = [...staffData.entries].reverse(); // nieuwste boven
  for (const e of entries) {
    const tr = document.createElement("tr");
    const sigImg = (e.sig && e.sig.length)
      ? `<img class="sig-thumb" src="${strokesToDataUrl(e.sig, 300, 100)}" alt="signature">` : "—";
    const outCell = e.timeOut
      ? escapeHtml(e.timeOut)
      : `<span class="still-in">still in</span>`;
    const outBtn = (!e.timeOut && e.date === todayStr())
      ? `<button class="mini no-print" data-id="${escapeHtml(e.id)}">set out</button>` : "";
    tr.innerHTML = `
      <td>${escapeHtml(fmtDateGB(e.date))}</td>
      <td><b>${escapeHtml(e.name)}</b></td>
      <td>${escapeHtml(e.email || "")}</td>
      <td>${escapeHtml(e.phone || "")}</td>
      <td>${escapeHtml(e.vehicle || "")}</td>
      <td>${escapeHtml(e.heard || "")}</td>
      <td>${escapeHtml(e.timeIn || "")}</td>
      <td>${outCell}</td>
      <td>${sigImg}</td>
      <td class="no-print">${outBtn}</td>
    `;
    body.appendChild(tr);
  }
  el("staffMeta").textContent = entries.length + " entries";
  el("printMonthLabel").textContent = el("monthSelect").selectedOptions[0]?.textContent || "";
  // "set out"-knoppen
  body.querySelectorAll("button.mini").forEach(b => {
    b.addEventListener("click", async () => {
      const fresh = await kvLoad(staffBucket);
      const entry = fresh.entries.find(x => x.id === b.dataset.id);
      if (entry && !entry.timeOut) {
        entry.timeOut = timeStr();
        await kvSave(staffBucket, fresh);
        if (staffBucket === monthKey()) state = fresh;
        renderStaffLog(staffBucket);
        refreshPresentCount();
      }
    });
  });
}

el("btnExportCsv").addEventListener("click", () => {
  const rows = [["Date","Name","Email","Phone","Vehicle","Heard about us","Time in","Time out","Signed"]];
  for (const e of staffData.entries) {
    rows.push([e.date, e.name, e.email || "", e.phone || "", e.vehicle || "", e.heard || "", e.timeIn || "", e.timeOut || "", (e.sig && e.sig.length) ? "yes" : "no"]);
  }
  const csv = rows.map(r => r.map(v => /[",\n]/.test(v) ? '"' + String(v).replace(/"/g, '""') + '"' : v).join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
  a.download = staffBucket + ".csv";
  a.click();
  URL.revokeObjectURL(a.href);
});
el("btnPrint").addEventListener("click", () => window.print());

// ─── Util ───
function fmtDateGB(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
</script>
